# Format reference for validation_set/labels.yaml.
# Real labels are NOT committed (see validation_set/README.md).
#
# Per parent plan §H8 + Codex iter-1 fixes:
# - Top-level `expected_stratification` REQUIRED — gates the harness against
#   incomplete corpora. Harness fails loudly if actual labeled docs don't match.
# - Per-doc `labels` are sampled positives (recall-only).
# - Per-doc `negative_labels` are explicit terms the extractor MUST NOT emit
#   (only when present do we compute precision; otherwise precision is reported
#   as informational only — sampled positives can't fairly compute precision).

expected_stratification:
  AR: 15
  PAM: 5
  FM: 4
  ATP: 3
  ADP: 1
  TC: 1
  TM: 1
  # Total: 30 PDFs per parent plan §H8

documents:
  - pdf: AR_600-20.pdf
    doc_type: AR
    labels:
      - term: Combatant Command
        term_normalized: combatant command
        definition: A unified or specified command with a broad continuing mission under a single commander established and so designated by the President.
        pdf_page_index: 142
        source_type: glossary
      - term: Permanent Change of Station
        term_normalized: permanent change of station
        definition: The official assignment of a Soldier from one duty station to another.
        pdf_page_index: 145
        source_type: glossary
    # OPTIONAL: terms the extractor MUST NOT emit. Only when present is precision
    # computed — otherwise the harness gates on recall + def_jaccard only.
    negative_labels:
      - term: Figure 1
        source_type: glossary  # extractor should never emit a "Figure" caption as a glossary term
      - term: Chapter 3
        source_type: glossary

  - pdf: PAM_600-3.pdf
    doc_type: PAM
    labels:
      - term: Officer Talent Management
        term_normalized: officer talent management
        definition: A deliberate strategy to retain and develop officers across their careers.
        pdf_page_index: 12
        source_type: inline

  # ... 28 more documents per the H8 stratification (15 AR, 5 PAM, 4 FM, 3 ATP, 1 ADP, 1 TC, 1 TM)
